<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逆合成搜索结果可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-height: 70vh;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #333;
        }

        .route-list {
            list-style: none;
        }

        .route-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .route-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .route-item.active {
            background: #667eea;
            color: white;
        }

        .route-item-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .route-item-info {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .route-detail {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .route-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .route-detail-header h2 {
            color: #333;
        }

        .route-detail-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
        }

        .section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #667eea;
        }

        .node-list, .edge-list {
            list-style: none;
        }

        .node-item, .edge-item {
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }

        .node-item-title, .edge-item-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .node-item-detail, .edge-item-detail {
            font-size: 0.85rem;
            color: #666;
        }

        .smiles {
            font-family: monospace;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .probability-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .probability-high {
            background: #d4edda;
            color: #155724;
        }

        .probability-medium {
            background: #fff3cd;
            color: #856404;
        }

        .probability-low {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .route-detail-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 逆合成搜索结果可视化</h1>
            <p>Retro Synthesis Search Results Visualization</p>
        </header>

        <div class="stats-bar">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalRoutes">-</div>
                    <div class="stat-label">总路径数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avgNodes">-</div>
                    <div class="stat-label">平均节点数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avgEdges">-</div>
                    <div class="stat-label">平均反应数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="graphType">-</div>
                    <div class="stat-label">图类型</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <aside class="sidebar">
                <h2>📋 路径列表</h2>
                <ul class="route-list" id="routeList">
                    <li class="loading">加载中...</li>
                </ul>
            </aside>

            <main class="route-detail" id="routeDetail">
                <div style="text-align: center; padding: 40px; color: #999;">
                    <p>👈 请从左侧选择一条路径查看详情</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_BASE = 'http://192.168.100.108:5000';
        let currentRouteIndex = null;

        // 加载路径列表
        async function loadRoutes() {
            const routeList = document.getElementById('routeList');
            routeList.innerHTML = '<li class="loading">正在连接服务器...</li>';

            try {
                console.log('Fetching:', `${API_BASE}/api/routes`);
                const response = await fetch(`${API_BASE}/api/routes`);
                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const routes = await response.json();
                console.log('Routes data:', routes);

                if (routes.length === 0) {
                    routeList.innerHTML = `
                        <li class="error">
                            <strong>服务器返回空列表</strong><br>
                            请确认 search_results 目录中有 route_*.json 文件<br>
                            检查服务器日志确认正确的路径
                        </li>
                    `;
                    // 清空统计信息
                    document.getElementById('totalRoutes').textContent = '0';
                    return;
                }

                // 更新统计信息
                document.getElementById('totalRoutes').textContent = routes.length;
                if (routes.length > 0) {
                    const avgNodes = (routes.reduce((sum, r) => sum + r.num_nodes, 0) / routes.length).toFixed(1);
                    const avgEdges = (routes.reduce((sum, r) => sum + r.num_edges, 0) / routes.length).toFixed(1);
                    document.getElementById('avgNodes').textContent = avgNodes;
                    document.getElementById('avgEdges').textContent = avgEdges;
                    document.getElementById('graphType').textContent = routes[0].graph_type;
                }

                // 渲染路径列表
                const routeList = document.getElementById('routeList');
                routeList.innerHTML = '';
                routes.forEach(route => {
                    const li = document.createElement('li');
                    li.className = 'route-item';
                    li.dataset.index = route.index;
                    li.innerHTML = `
                        <div class="route-item-title">路径 ${route.index}</div>
                        <div class="route-item-info">
                            ${route.num_nodes} 节点 | ${route.num_edges} 反应
                        </div>
                    `;
                    li.addEventListener('click', () => loadRouteDetail(route.index));
                    routeList.appendChild(li);
                });
            } catch (error) {
                console.error('Error loading routes:', error);
                routeList.innerHTML = `
                    <li class="error">
                        <strong>加载失败</strong><br>
                        错误: ${error.message}<br><br>
                        请检查:<br>
                        1. API 服务是否运行在 ${API_BASE}<br>
                        2. 打开浏览器控制台 (F12) 查看详细错误<br>
                        3. 确认服务器防火墙允许端口 5000<br>
                        4. 尝试访问 <a href="${API_BASE}/docs" target="_blank">${API_BASE}/docs</a> 测试连接
                    </li>
                `;
            }
        }

        // 加载路径详情
        async function loadRouteDetail(routeIndex) {
            try {
                const response = await fetch(`${API_BASE}/api/route/${routeIndex}`);
                if (!response.ok) throw new Error('Failed to load route detail');
                const route = await response.json();

                currentRouteIndex = routeIndex;

                // 更新选中状态
                document.querySelectorAll('.route-item').forEach(item => {
                    item.classList.toggle('active', parseInt(item.dataset.index) === routeIndex);
                });

                // 渲染路径详情
                renderRouteDetail(route);
            } catch (error) {
                document.getElementById('routeDetail').innerHTML =
                    `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        // 渲染路径详情
        function renderRouteDetail(route) {
            const container = document.getElementById('routeDetail');

            // 渲染节点列表
            let nodesHtml = '<ul class="node-list">';
            route.nodes.forEach(node => {
                const smiles = node.smiles || node.smiles_list?.join(' + ') || 'N/A';
                const purchasableBadge = node.is_purchasable ?
                    '<span style="color: green;">✓ 可购买</span>' :
                    '<span style="color: #999;">✗ 需合成</span>';

                nodesHtml += `
                    <li class="node-item">
                        <div class="node-item-title">节点 ${node.local_index}</div>
                        <div class="node-item-detail">
                            <div>SMILES: <span class="smiles">${smiles}</span></div>
                            <div>${purchasableBadge}</div>
                            <div>深度: ${node.depth}</div>
                            ${node.data?.policy_score ? `<div>策略分数: ${node.data.policy_score.toFixed(3)}</div>` : ''}
                        </div>
                    </li>
                `;
            });
            nodesHtml += '</ul>';

            // 渲染边（反应）列表
            let edgesHtml = '<ul class="edge-list">';
            route.edges.forEach((edge, idx) => {
                const reaction = edge.reaction;
                if (reaction) {
                    const prob = reaction.metadata?.probability;
                    let probBadge = '';
                    if (prob !== undefined) {
                        const probPercent = (prob * 100).toFixed(1);
                        if (prob > 0.5) {
                            probBadge = `<span class="probability-badge probability-high">${probPercent}%</span>`;
                        } else if (prob > 0.2) {
                            probBadge = `<span class="probability-badge probability-medium">${probPercent}%</span>`;
                        } else {
                            probBadge = `<span class="probability-badge probability-low">${probPercent}%</span>`;
                        }
                    }

                    edgesHtml += `
                        <li class="edge-item">
                            <div class="edge-item-title">反应 ${idx + 1}</div>
                            <div class="edge-item-detail">
                                <div>反应 SMILES: <span class="smiles">${reaction.reaction_smiles || 'N/A'}</span></div>
                                <div>产物: <span class="smiles">${reaction.product || 'N/A'}</span></div>
                                <div>原料: <span class="smiles">${reaction.reactants?.join(' + ') || 'N/A'}</span></div>
                                <div>置信度: ${probBadge}</div>
                            </div>
                        </li>
                    `;
                }
            });
            edgesHtml += '</ul>';

            container.innerHTML = `
                <div class="route-detail-header">
                    <h2>🔬 路径 ${route.route_index} 详情</h2>
                    <span>${route.graph_type}</span>
                </div>
                <div class="route-detail-content">
                    <div class="section">
                        <h3>📍 节点列表 (${route.num_nodes})</h3>
                        ${nodesHtml}
                    </div>
                    <div class="section">
                        <h3>⚗️ 反应列表 (${route.num_edges})</h3>
                        ${edgesHtml}
                    </div>
                </div>
            `;
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadRoutes();
        });
    </script>
</body>
</html>
